name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-and-build:
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check formatting
        run: nix run .#ci-check

      - name: Check Haskell quality
        run: nix run .#ci-haskell-quality

      - name: Check vectors
        run: nix run .#ci-check-vectors

      - name: Build app
        run: nix run .#ci-build

      - name: Build docs
        run: nix develop github:paolino/dev-assets?dir=mkdocs --quiet -c mkdocs build --strict

      - name: Run PureScript tests
        run: nix run .#ci-test

      - name: Run Playwright UI tests
        run: nix run .#ci-playwright

  pr-preview:
    if: github.event_name == 'pull_request'
    needs: check-and-build
    runs-on: nixos
    continue-on-error: true
    env:
      SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build app bundle
        run: nix build .#web-dist --out-link result-dist

      - name: Build docs
        run: nix develop github:paolino/dev-assets?dir=mkdocs --quiet -c mkdocs build --strict

      - name: Assemble preview artifact
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -LR result-dist/* site-root/
          chmod -R u+w site-root
          cp -R site/* site-root/docs/

      - name: Skip preview when SURGE_TOKEN is missing
        if: ${{ env.SURGE_TOKEN == '' }}
        run: echo "SURGE_TOKEN is not configured; skipping PR preview."

      - name: Validate Surge token
        id: surge_auth
        if: ${{ env.SURGE_TOKEN != '' }}
        continue-on-error: true
        run: nix shell nixpkgs#nodejs_22 -c npx --yes surge@0.27.3 whoami --token "$SURGE_TOKEN"

      - name: Deploy to Surge
        id: surge_deploy
        if: ${{ env.SURGE_TOKEN != '' && steps.surge_auth.outcome == 'success' }}
        continue-on-error: true
        run: |
          nix shell nixpkgs#nodejs_22 -c npx --yes surge@0.27.3 \
            site-root \
            ${{ github.repository_owner }}-${{ github.event.repository.name }}-pr-${{ github.event.number }}.surge.sh \
            --token "$SURGE_TOKEN"

      - name: Comment preview URL on PR
        if: ${{ env.SURGE_TOKEN != '' && steps.surge_auth.outcome == 'success' && steps.surge_deploy.outcome == 'success' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}-${context.repo.repo}-pr-${context.issue.number}.surge.sh`;
            const marker = '<!-- surge-preview-url -->';
            const body = `${marker}\nPreview: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Note preview failure
        if: ${{ env.SURGE_TOKEN != '' && (steps.surge_auth.outcome != 'success' || steps.surge_deploy.outcome != 'success') }}
        run: echo "Surge preview is unavailable because the token is invalid or Surge rejected the deployment; leaving CI green because preview publishing is optional."
