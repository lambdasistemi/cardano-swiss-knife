name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-and-build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check formatting
        run: nix run .#ci-check

      - name: Check Haskell quality
        run: nix run .#ci-haskell-quality

      - name: Check vectors
        run: nix run .#ci-check-vectors

      - name: Build app
        run: nix run .#ci-build

      - name: Build docs
        run: nix develop github:paolino/dev-assets?dir=mkdocs --quiet -c mkdocs build --strict

      - name: Run PureScript tests
        run: nix run .#ci-test

      - name: Run Playwright UI tests
        run: nix run .#ci-playwright

  pr-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: check-and-build
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build app bundle
        run: nix build .#web-dist --out-link result-dist

      - name: Build docs
        run: nix develop github:paolino/dev-assets?dir=mkdocs --quiet -c mkdocs build --strict

      - name: Assemble preview artifact
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -LR result-dist/* site-root/
          chmod -R u+w site-root
          cp -R site/* site-root/docs/

      - name: Publish shared preview
        uses: paolino/dev-assets/static-preview@main
        with:
          path: site-root
          comment-marker: "<!-- shared-preview-url -->"

  pr-preview-cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: nixos

    steps:
      - name: Remove shared preview
        uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup
