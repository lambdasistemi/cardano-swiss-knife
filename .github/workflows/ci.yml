name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check-and-build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Check formatting
        run: nix run .#ci-check

      - name: Check Haskell quality
        run: nix run .#ci-haskell-quality

      - name: Check vectors
        run: nix run .#ci-check-vectors

      - name: Build app
        run: nix run .#ci-build

      - name: Run Node API contract checks
        run: nix run .#ci-node-api

      - name: Build docs
        run: nix develop --quiet -c just build-docs

      - name: Run PureScript tests
        run: nix run .#ci-test

      - name: Run Playwright UI tests
        run: nix run .#ci-playwright

      - name: Run inspector Playwright parity tests
        run: nix run .#ci-inspector-playwright

      - name: Run inspector UX capture
        run: nix run .#ci-ux-capture

      - name: Smoke-test combined site
        run: nix run .#ci-combined-site-smoke

      - name: Run development CI gate
        run: nix develop --quiet -c just ci

  node-package-artifact:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build packed Node artifact
        run: nix build .#node-package --out-link node-package

      - name: Upload packed Node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-package
          path: node-package/*.tgz
          if-no-files-found: error

  node-package-smoke:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    needs: node-package-artifact
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download packed Node artifact
        uses: actions/download-artifact@v4
        with:
          name: node-package
          path: node-package

      - name: Smoke packed Node artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(node-package/*.tgz)
          if [ ${#tarballs[@]} -ne 1 ]; then
            echo "expected exactly one .tgz, found ${#tarballs[@]}" >&2
            exit 1
          fi
          export CSK_PACKAGE_TARBALL="${{ github.workspace }}/${tarballs[0]}"
          npm run test:package

  pr-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: check-and-build
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build app bundle
        run: nix build .#combined-site --out-link result-dist

      - name: Build docs
        run: nix develop --quiet -c just build-docs

      - name: Assemble preview artifact
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -LR result-dist/* site-root/
          chmod -R u+w site-root
          cp -R site/* site-root/docs/

      - name: Publish shared preview
        uses: paolino/dev-assets/static-preview@main
        with:
          path: site-root
          comment-marker: "<!-- shared-preview-url -->"

  pr-preview-cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: nixos

    steps:
      - name: Remove shared preview
        uses: paolino/dev-assets/static-preview@main
        with:
          mode: cleanup
