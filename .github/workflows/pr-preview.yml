name: PR preview

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: nixos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build app bundle
        run: nix build .#web-dist --out-link result-dist

      - name: Build docs
        run: nix develop github:paolino/dev-assets?dir=mkdocs --quiet -c mkdocs build --strict

      - name: Assemble preview artifact
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -LR result-dist/* site-root/
          chmod -R u+w site-root
          cp -R site/* site-root/docs/

      - name: Skip preview when SURGE_TOKEN is missing
        if: ${{ secrets.SURGE_TOKEN == '' }}
        run: echo "SURGE_TOKEN is not configured; skipping PR preview."

      - name: Deploy to Surge
        if: ${{ secrets.SURGE_TOKEN != '' }}
        run: |
          nix --quiet shell nixpkgs#nodePackages.surge -c surge \
            site-root \
            ${{ github.repository_owner }}-${{ github.event.repository.name }}-pr-${{ github.event.number }}.surge.sh \
            --token ${{ secrets.SURGE_TOKEN }}

      - name: Comment preview URL on PR
        if: ${{ secrets.SURGE_TOKEN != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://${context.repo.owner}-${context.repo.repo}-pr-${context.issue.number}.surge.sh`;
            const marker = '<!-- surge-preview-url -->';
            const body = `${marker}\nPreview: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(comment => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
