name: Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (must be v* and match package.json version)"
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: nixos

    steps:
      # Explicit tag path: push tags use github.ref_name; manual dispatch
      # requires a v* tag input so default-branch dispatch cannot pass
      # --tag main or publish stale branch artifacts.
      - name: Resolve release tag
        id: release-tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          case "$TAG" in
            v*)
              ;;
            *)
              echo "pages publish requires a v* release tag; got: ${TAG}" >&2
              exit 1
              ;;
          esac
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.tag }}

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: paolino
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Verify tag matches package.json
        run: nix develop --quiet -c node scripts/check-release-version.mjs --tag "${{ steps.release-tag.outputs.tag }}"

      - name: Build app bundle
        run: nix build .#combined-site --out-link result-dist

      - name: Build docs
        run: nix develop --quiet -c just build-docs

      - name: Assemble Pages artifact
        run: |
          rm -rf site-root
          mkdir -p site-root/docs
          cp -LR result-dist/* site-root/
          chmod -R u+w site-root
          cp -R site/* site-root/docs/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-root

  deploy:
    needs: build
    runs-on: nixos
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
