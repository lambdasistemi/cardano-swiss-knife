site_name: Cardano Swiss Knife Documentation
site_url: https://lambdasistemi.github.io/cardano-swiss-knife/docs/
repo_url: https://github.com/lambdasistemi/cardano-swiss-knife

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.path
    - toc.integrate
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - footnotes
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Concepts: concepts.md
  - Architecture:
      - System: architecture/system.md
      - Storage and Secrets: architecture/storage.md
  - User Manual:
      - Usage: user/usage.md
  - Developer:
      - Workflows: dev/workflows.md
