package:
  name: tx-inspector-ui
  dependencies:
    - prelude
    - effect
    - aff
    - aff-promise
    - cardano-addresses
    - console
    - halogen
    - maybe
    - either
    - strings
    - web-html
    - web-events
    - foreign
    - exceptions
    - rdf-editor
  bundle:
    module: Main
    outfile: dist/index.js
    platform: browser
    type: app

workspace:
  packageSet:
    registry: 72.1.0
  extraPackages:
    cardano-addresses:
      path: ../../lib
    rdf-editor:
      path: ../../packages/purescript-rdf-editor
